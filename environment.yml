name: fhm-argens-gapeu
channels:
  - defaults
  - conda-forge
dependencies:
  # Core
  - python>=3.9
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10

  # Machine Learning
  - scikit-learn>=1.3
  - xgboost>=2.0

  # Geospatial
  - rasterio>=1.3
  - geopandas>=0.14
  - fiona>=1.9
